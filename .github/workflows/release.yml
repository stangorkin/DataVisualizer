name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build-desktop:
    name: Build & publish desktop
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore DataVizAgent.sln

      - name: Test
        run: dotnet test tests/DataVizAgent.Core.Tests/DataVizAgent.Core.Tests.csproj --no-restore --verbosity minimal

      - name: Publish (self-contained, single-file, win-x64)
        run: |
          dotnet publish src/DataVizAgent.Desktop/DataVizAgent.Desktop.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output artifacts/desktop

      # The GGUF model cannot be bundled; create a placeholder models/ folder and
      # a helper script so users know exactly where to drop the file.
      - name: Add models placeholder
        run: |
          New-Item -ItemType Directory -Path artifacts/desktop/models -Force | Out-Null
          Set-Content artifacts/desktop/models/PUT_YOUR_MODEL_HERE.txt @"
          Place your GGUF model file in this folder.
          DataViz Agent automatically uses the first *.gguf file it finds here.

          Recommended models (Qwen3 - strong tool calling; grab the Q4_K_M .gguf):
            Qwen3-4B       ~2.5 GB   8 GB RAM, CPU-only               https://huggingface.co/bartowski/Qwen_Qwen3-4B-GGUF
            Qwen3-8B       ~5.0 GB   16 GB RAM / 8 GB VRAM  [recommended]  https://huggingface.co/bartowski/Qwen_Qwen3-8B-GGUF
            Qwen3-14B      ~9.0 GB   32 GB RAM / 12 GB VRAM           https://huggingface.co/bartowski/Qwen_Qwen3-14B-GGUF
            Qwen3-30B-A3B  ~18.6 GB  32 GB+ RAM / 24 GB VRAM          https://huggingface.co/bartowski/Qwen_Qwen3-30B-A3B-GGUF

          Full guidance (hardware tiers, quantization, GPU) - see "Choosing a local model" in the README:
            ${{ github.server_url }}/${{ github.repository }}#choosing-a-local-model

          You can also override the path via the LLAMASHARP_MODEL_PATH environment variable,
          or by setting LLamaSharp:ModelPath in appsettings.json.
          "@

      - name: Zip artifact
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path artifacts/desktop/* -DestinationPath "DataVizAgent-$version-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "DataViz Agent ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: DataVizAgent-${{ github.ref_name }}-win-x64.zip
          body: |
            ## DataViz Agent ${{ github.ref_name }}

            ### Quick start
            1. Download `DataVizAgent-${{ github.ref_name }}-win-x64.zip` and extract it.
            2. Download a GGUF model (see [Hugging Face](https://huggingface.co/models?search=gguf)) and place the `.gguf` file in the `models/` folder inside the extracted directory.
            3. Run `DataVizAgent.Desktop.exe` — no .NET installation required.

            > **GPU acceleration:** set `LLamaSharp:Backend` to `cuda` in `appsettings.json` and `LLamaSharp:GpuLayerCount` to the number of layers to offload.
